<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | V Lukach</title>
    <meta name="description" content="Mate dotaz ohledne akustickych kabin nebo chcete spolupracovat? Napiste nam pres kontaktni formular.">
    <meta name="keywords" content="kontakt V Lukach, akusticke kabiny dotaz, kontaktni formular">
    <meta name="author" content="V Lukach">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Kontakt | V Lukach">
    <meta property="og:description" content="Mate dotaz ohledne akustickych kabin? Napiste nam.">
    <meta property="og:url" content="https://penzionvlukach.cz/kontakt">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://penzionvlukach.cz/kontakt">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">V Lukach</a>
            <button class="hamburger" onclick="this.classList.toggle('open');document.querySelector('.nav-links').classList.toggle('open')">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-links">
                <a href="/">Hlavni</a>
                <a href="/kabiny">Kabiny</a>
                <a href="/gallery">Galerie</a>
                <a href="/redakce">Redakce</a>
                <a href="/kontakt" class="active">Kontakt</a>
            </div>
        </nav>
    </header>

    <div class="page-header">
        <h1>Napiste nam</h1>
    </div>

    <main>
        <div class="container">
            <div class="contact-form">
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Jmeno a prijmeni</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Telefon</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    <div class="form-group">
                        <label for="message">Zprava</label>
                        <textarea id="message" name="message" rows="6" required></textarea>
                    </div>
                    <button type="submit">Odeslat zpravu</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <div class="footer-tagline">V Lukach — online magazin o akustice a produktivite</div>
            <div class="footer-links">
                <a href="/">Hlavni</a>
                <a href="/kabiny">Kabiny</a>
                <a href="/gallery">Galerie</a>
                <a href="/redakce">Redakce</a>
                <a href="/kontakt">Kontakt</a>
            </div>
            <div class="footer-copy">&copy; 2025 V Lukach</div>
        </div>
    </footer>
</body>
</html>
